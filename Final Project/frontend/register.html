<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Campus Marketplace</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<div class="container">

    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-lg-11">

            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

                <div class="row g-0">

                    <!-- Left Section -->

                    <div class="col-lg-5 register-left d-flex flex-column justify-content-center">

                        <h1 class="fw-bold mb-3">
                            Join Campus Marketplace
                        </h1>

                        <p class="lead">

                            Buy and sell second-hand items with trusted students around you.

                        </p>

                        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800"
                             class="img-fluid rounded mt-4">

                    </div>

                    <!-- Right Section -->

                    <div class="col-lg-7 bg-white">

                        <div class="p-5">

                            <h2 class="fw-bold text-center mb-4">
                                Create Account
                            </h2>

                            <form id="registerForm">

                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            First Name
                                        </label>

                                        <input
                                            type="text"
                                            class="form-control form-control-lg"
                                            placeholder="First Name"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Last Name
                                        </label>

                                        <input
                                            type="text"
                                            class="form-control form-control-lg"
                                            placeholder="Last Name"
                                            required>

                                    </div>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Email Address
                                    </label>

                                    <input
                                        type="email"
                                        class="form-control form-control-lg"
                                        placeholder="Enter Email"
                                        required>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Phone Number
                                    </label>

                                    <input
                                        type="tel"
                                        class="form-control form-control-lg"
                                        placeholder="Enter Phone Number"
                                        required>

                                </div>

                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Password
                                        </label>

                                        <input
                                            type="password"
                                            class="form-control form-control-lg"
                                            placeholder="Password"
                                            required>

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">
                                            Confirm Password
                                        </label>

                                        <input
                                            type="password"
                                            class="form-control form-control-lg"
                                            placeholder="Confirm Password"
                                            required>

                                    </div>

                                </div>

                                <div class="mb-4 form-check">

                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        required>

                                    <label class="form-check-label">

                                        I agree to the
                                        <a href="#" class="text-decoration-none">
                                            Terms & Conditions
                                        </a>

                                    </label>

                                </div>

                                <button
                                    type="submit"
                                    class="btn btn-primary btn-lg w-100">

                                    Create Account

                                </button>

                            </form>

                            <hr>

                            <p class="text-center">

                                Already have an account?

                                <a href="login.html" class="text-decoration-none fw-bold">

                                    Login

                                </a>

                            </p>

                            <div class="text-center">

                                <a href="landing.html" class="btn btn-outline-secondary">

                                    ← Back to Home

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("registerForm").addEventListener("submit",function(e){

    e.preventDefault();

    alert("Registration Successful!");

    window.location.href="login.html";

});
</script>

</body>
</html>

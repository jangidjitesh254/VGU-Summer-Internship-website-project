<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card p-5 shadow">

<h2 class="mb-4 text-center">

Edit Product

</h2>

<form id="editForm">

<input id="title" class="form-control mb-3" placeholder="Title">

<input id="price" type="number" class="form-control mb-3" placeholder="Price">

<input id="category" class="form-control mb-3" placeholder="Category">

<input id="condition" class="form-control mb-3" placeholder="Condition">

<input id="image" class="form-control mb-3" placeholder="Image URL">

<textarea
id="description"
class="form-control mb-4"
rows="5"
placeholder="Description"></textarea>

<button class="btn btn-success w-100">

Update Product

</button>

</form>

</div>

</div>

</div>

</div>

<script>

const id=new URLSearchParams(window.location.search).get("id");

async function loadProduct(){

const response=await fetch(`http://localhost:5000/products/${id}`);

const product=await response.json();

title.value=product.title;

price.value=product.price;

category.value=product.category;

condition.value=product.condition;

image.value=product.image;

description.value=product.description;

}

loadProduct();

editForm.addEventListener("submit",async(e)=>{

e.preventDefault();

const updatedProduct={

title:title.value,

price:price.value,

category:category.value,

condition:condition.value,

image:image.value,

description:description.value

};

await fetch(`http://localhost:5000/products/${id}`,{

method:"PUT",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(updatedProduct)

});

alert("Product Updated Successfully");

window.location="dashboard.html";

});

</script>

</body>

</html>

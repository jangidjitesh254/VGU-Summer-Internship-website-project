<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | ReUse </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-lg-10">

                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">

                    <div class="row g-0">

                        <!-- Left Side -->

                        <div class="col-md-6 login-left d-flex flex-column justify-content-center">

                            <h1 class="fw-bold mb-3">
                                Welcome Back!
                            </h1>

                            <p class="lead">

                                Buy and sell second-hand items safely within your campus.

                            </p>

                            <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800"
                                class="img-fluid rounded mt-4">

                        </div>

                        <!-- Right Side -->

                        <div class="col-md-6 bg-white">

                            <div class="p-5">

                                <h2 class="fw-bold text-center mb-4">
                                    Login
                                </h2>

                                <form id="loginForm>

                                    <div class="mb-3">

                                        <label class="form-label">
                                            Email
                                        </label>

                                        <input type="email" class="form-control form-control-lg"
                                            placeholder="Enter Email">

                                    </div>

                                    <div class="mb-3">

                                        <label class="form-label">
                                            Password
                                        </label>

                                        <input type="password" class="form-control form-control-lg"
                                            placeholder="Enter Password">

                                    </div>

                                    <div class="d-flex justify-content-between mb-4">

                                        <div>

                                            <input class="form-check-input" type="checkbox">

                                            Remember Me

                                        </div>

                                        <a href="#" class="text-decoration-none">
                                            Forgot Password?
                                        </a>

                                    </div>

                                    <button type="submit" class="btn btn-success w-100 btn-lg">

                                        Login

                                    </button>

                                </form>

                                <hr>

                                <p class="text-center">

                                    Don't have an account?
                                    <a href="register.html" class="fw-bold text-decoration-none">
                                        Register
                                    </a>

                                </p>

                                <div class="text-center mt-3">

                                    <a href="landing.html" class="btn btn-outline-secondary">

                                        Back to Home

                                    </a>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | ReUse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="dashboard-bg">


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

        <div class="container">

            <a class="navbar-brand fw-bold fs-3 text-success" href="#">
                ReUse
            </a>

            <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#nav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="nav">

               

                <form class="d-flex mx-auto w-50">

                    <input
                        class="form-control me-2"
                        type="search"
                        placeholder="Search products...">

                    <button class="btn btn-success">

                        <i class="bi bi-search"></i>

                    </button>

                </form>

               

                <ul class="navbar-nav align-items-center">

                    <li class="nav-item me-3">

                        <a class="nav-link" href="#">

                            <i class="bi bi-heart"></i>

                            Wishlist

                        </a>

                    </li>

                    <li class="nav-item me-3">

                        <a class="nav-link" href="#">

                            <i class="bi bi-person-circle"></i>

                            Profile

                        </a>

                    </li>

                    <li class="nav-item">

                        <a href="addProduct.html" class="btn btn-success">

                            Sell Item

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    

    <section class="dashboard-hero">

        <div class="container">

            <div class="row align-items-center">

                <div class="col-lg-7">

                    <h1 class="display-5 fw-bold">

                        Find Great Deals Around Your Campus

                    </h1>

                    <p class="lead mt-3">

                        Buy and sell second-hand products quickly and easily.

                    </p>

                    <a href="#products" class="btn btn-success btn-lg mt-3">

                        Browse Products

                    </a>

                </div>

                <div class="col-lg-5 text-center">

                    <img
                        src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800"
                        class="img-fluid rounded shadow">

                </div>

            </div>

        </div>

    </section>

    

    <section class="container py-5">

        <h2 class="fw-bold mb-4">

            Categories

        </h2>

        <div class="row g-4">

            <div class="col-lg-2 col-md-4 col-6">

                <button class="category-btn w-100">

                     Books

                </button>

            </div>

            <div class="col-lg-2 col-md-4 col-6">

                <button class="category-btn w-100">

                     Electronics

                </button>

            </div>

            <div class="col-lg-2 col-md-4 col-6">

                <button class="category-btn w-100">

                     Furniture

                </button>

            </div>

            <div class="col-lg-2 col-md-4 col-6">

                <button class="category-btn w-100">

                     Fashion

                </button>

            </div>

            <div class="col-lg-2 col-md-4 col-6">

                <button class="category-btn w-100">

                    🚲 Sports

                </button>

            </div>

            <div class="col-lg-2 col-md-4 col-6">

                <button class="category-btn w-100">

                    📱 Others

                </button>

            </div>

        </div>

    </section>

    

    <section class="container pb-5" id="products">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold">

                Latest Products

            </h2>

            <button onclick="loadProducts()" class="btn btn-outline-success">

                Refresh

            </button>

        </div>

       

        <div class="row g-4" id="productContainer">

        </div>

    </section>

    

    <footer class="bg-dark text-white text-center py-3">

        <p class="mb-0">

            © 2026 ReUse Marketplace | All Rights Reserved

        </p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="dashboard.js"></script>

</body>

</html>
